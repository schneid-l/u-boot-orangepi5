name: Build & Release U-Boot (Orange Pi 5)

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .github/workflows/build.yaml
  pull_request:
    paths:
      - Dockerfile
      - .github/workflows/build.yaml
  workflow_dispatch:

# Fixed timestamp so the produced binaries are bit-for-bit reproducible.
env:
  SOURCE_DATE_EPOCH: "1712055538"

# Least privilege by default; jobs opt into exactly what they need.
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.board.title }}${{ matrix.variant.title }}
    # Only spend runner minutes on trusted PRs: Renovate, the repo owner, or a
    # PR explicitly labelled "build". Pushes to main and manual runs always build.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.user.login == 'renovate[bot]' ||
      github.event.pull_request.author_association == 'OWNER' ||
      contains(github.event.pull_request.labels.*.name, 'build')
    runs-on:
      - ubicloud-standard-16-arm
    permissions:
      contents: read
      packages: write # push/pull the buildkit registry cache on ghcr.io
      id-token: write # SLSA provenance attestation
      attestations: write # SLSA provenance attestation
    strategy:
      fail-fast: false
      matrix:
        board:
          - title: Orange Pi 5
            name: orangepi5
            defconfig: orangepi-5-rk3588s
          - title: Orange Pi 5 Plus
            name: orangepi5-plus
            defconfig: orangepi-5-plus-rk3588
          - title: Orange Pi 5 Max
            name: orangepi5-max
            defconfig: orangepi-5-max-rk3588
          - title: Orange Pi 5 Ultra
            name: orangepi5-ultra
            defconfig: orangepi-5-ultra-rk3588
        variant:
          - title: ""
            suffix: ""
            optee: "off"
          - title: " + OP-TEE"
            suffix: "-optee"
            optee: "on"
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Registry cache lives on ghcr.io so it is shared across all branches
      # (unlike type=gha, which main cannot read from a PR). A PR build warms
      # the cache and the post-merge build on main reuses every layer.
      - name: Log in to ghcr.io (build cache)
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ${{ matrix.board.title }}${{ matrix.variant.title }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          outputs: type=local,dest=./out
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/buildcache:${{ matrix.board.name }}-${{ matrix.variant.optee }}
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/buildcache:${{ matrix.board.name }}-${{ matrix.variant.optee }},mode=max,image-manifest=true,oci-mediatypes=true,compression=zstd,ignore-error=true
          build-args: |
            SOURCE_DATE_EPOCH=${{ env.SOURCE_DATE_EPOCH }}
            BOARD=${{ matrix.board.name }}
            DEFCONFIG=${{ matrix.board.defconfig }}
            NAME=u-boot-${{ matrix.board.name }}${{ matrix.variant.suffix }}-spi
            OPTEE=${{ matrix.variant.optee }}

      - name: Attest build provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ./out/*.bin

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: u-boot-${{ matrix.board.name }}${{ matrix.variant.suffix }}
          path: ./out/*
          if-no-files-found: error

  release:
    name: Sign & Release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on:
      - ubicloud-standard-2-arm
    permissions:
      contents: write # create / update the GitHub Release
      id-token: write # cosign keyless signing + SBOM attestation (Sigstore OIDC)
      attestations: write # SBOM attestation
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Read build manifest
        id: meta
        run: |
          manifest=$(printf '%s\n' artifacts/*.manifest.json | head -n1)
          if [ ! -f "$manifest" ]; then
            echo "::error::No build manifest found among the artifacts"; exit 1
          fi
          uboot=$(jq -r '.u_boot_version' "$manifest")
          if [ -z "$uboot" ] || [ "$uboot" = "null" ]; then
            echo "::error::u_boot_version missing from $manifest"; exit 1
          fi
          {
            echo "uboot=$uboot"
            echo "atf=$(jq -r '.atf_version' "$manifest")"
            echo "rkbin_ddr=$(jq -r '.rkbin_ddr_version' "$manifest")"
            echo "rkbin_ref=$(jq -r '.rkbin_ref' "$manifest")"
            echo "optee=$(jq -rs 'map(.optee_version) | map(select(. != "none")) | (.[0] // "none")' artifacts/*.manifest.json)"
            echo "ubuntu=$(jq -r '.ubuntu_version' "$manifest")"
          } >> "$GITHUB_OUTPUT"
          echo "Releasing U-Boot $uboot"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign binaries (cosign keyless)
        run: |
          for f in artifacts/*.bin; do
            cosign sign-blob --yes --bundle "${f}.cosign.bundle" "$f"
          done

      - name: Generate checksums and SBOM
        env:
          UBOOT: ${{ steps.meta.outputs.uboot }}
          ATF: ${{ steps.meta.outputs.atf }}
          OPTEE: ${{ steps.meta.outputs.optee }}
          DDR: ${{ steps.meta.outputs.rkbin_ddr }}
          UBUNTU: ${{ steps.meta.outputs.ubuntu }}
        run: |
          ( cd artifacts && sha256sum -- *.bin > SHA256SUMS )
          jq -n \
            --arg uboot "$UBOOT" --arg atf "$ATF" --arg optee "$OPTEE" \
            --arg ddr "$DDR" --arg ubuntu "$UBUNTU" \
            '{
              bomFormat: "CycloneDX",
              specVersion: "1.5",
              version: 1,
              metadata: { component: { type: "firmware", name: "u-boot-orangepi5", version: $uboot } },
              components: [
                { type: "firmware", name: "u-boot", version: $uboot, purl: ("pkg:github/u-boot/u-boot@" + $uboot) },
                { type: "firmware", name: "arm-trusted-firmware", version: $atf, purl: ("pkg:github/ARM-software/arm-trusted-firmware@" + $atf) },
                { type: "firmware", name: "optee_os", version: $optee, purl: ("pkg:github/OP-TEE/optee_os@" + $optee) },
                { type: "firmware", name: "rkbin-ddr-blob", version: $ddr },
                { type: "operating-system", name: "ubuntu", version: $ubuntu }
              ]
            }' > artifacts/sbom.cdx.json
          cat artifacts/SHA256SUMS

      - name: Attest SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: artifacts/*.bin
          sbom-path: artifacts/sbom.cdx.json

      - name: Create / update release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.meta.outputs.uboot }}
          name: U-Boot ${{ steps.meta.outputs.uboot }} — Orange Pi 5
          make_latest: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            Pre-built SPI U-Boot for the Orange Pi 5 / 5B / 5 Plus / Max / Ultra.

            `SHA256SUMS` (checksums) and `sbom.cdx.json` (CycloneDX SBOM, also attested) are attached.

            | Component | Version |
            | --------- | ------- |
            | U-Boot    | ${{ steps.meta.outputs.uboot }} |
            | Arm Trusted Firmware (BL31) | ${{ steps.meta.outputs.atf }} |
            | Rockchip DDR blob (rkbin)   | ${{ steps.meta.outputs.rkbin_ddr }} |
            | rkbin commit | `${{ steps.meta.outputs.rkbin_ref }}` |
            | OP-TEE (BL32, `-optee` variant only) | ${{ steps.meta.outputs.optee }} |

            Two variants are published per board:

            - `u-boot-<board>-spi.bin` — standard build (recommended).
            - `u-boot-<board>-optee-spi.bin` — adds the OP-TEE secure world (BL32). Experimental: please test on your board before relying on it.

            **Verify a binary**

            SLSA build provenance:
            ```bash
            gh attestation verify u-boot-orangepi5-spi.bin --repo ${{ github.repository }}
            ```

            Cosign signature (download the matching `.cosign.bundle`):
            ```bash
            cosign verify-blob \
              --bundle u-boot-orangepi5-spi.bin.cosign.bundle \
              --certificate-identity-regexp '^https://github.com/${{ github.repository }}/' \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              u-boot-orangepi5-spi.bin
            ```
          files: |
            artifacts/*.bin
            artifacts/*.manifest.json
            artifacts/*.cosign.bundle
            artifacts/SHA256SUMS
            artifacts/sbom.cdx.json
