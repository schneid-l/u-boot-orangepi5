name: Build & Release U-Boot (Orange Pi 5)

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .github/workflows/build.yaml
  pull_request:
    paths:
      - Dockerfile
      - .github/workflows/build.yaml
  workflow_dispatch:

# Fixed timestamp so the produced binaries are bit-for-bit reproducible.
env:
  SOURCE_DATE_EPOCH: "1712055538"

# Least privilege by default; jobs opt into exactly what they need.
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.board.title }}
    runs-on:
      - ubicloud-standard-16-arm
    permissions:
      contents: read
      id-token: write # SLSA provenance attestation
      attestations: write # SLSA provenance attestation
    strategy:
      fail-fast: false
      matrix:
        board:
          - title: Orange Pi 5
            name: orangepi5
            defconfig: orangepi-5-rk3588s
          - title: Orange Pi 5 Plus
            name: orangepi5-plus
            defconfig: orangepi-5-plus-rk3588
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build ${{ matrix.board.title }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          outputs: type=local,dest=./out
          cache-from: type=gha,scope=${{ matrix.board.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.board.name }}
          build-args: |
            SOURCE_DATE_EPOCH=${{ env.SOURCE_DATE_EPOCH }}
            BOARD=${{ matrix.board.name }}
            DEFCONFIG=${{ matrix.board.defconfig }}

      - name: Attest build provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ./out/*.bin

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: u-boot-${{ matrix.board.name }}
          path: ./out/*
          if-no-files-found: error

  release:
    name: Sign & Release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on:
      - ubicloud-standard-2-arm
    permissions:
      contents: write # create / update the GitHub Release
      id-token: write # cosign keyless signing (Sigstore OIDC)
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Read build manifest
        id: meta
        run: |
          manifest=$(printf '%s\n' artifacts/*.manifest.json | head -n1)
          {
            echo "uboot=$(jq -r .u_boot_version "$manifest")"
            echo "atf=$(jq -r .atf_version "$manifest")"
            echo "rkbin_ddr=$(jq -r .rkbin_ddr_version "$manifest")"
            echo "rkbin_ref=$(jq -r .rkbin_ref "$manifest")"
          } >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign binaries (cosign keyless)
        run: |
          for f in artifacts/*.bin; do
            cosign sign-blob --yes --bundle "${f}.cosign.bundle" "$f"
          done

      - name: Create / update release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.meta.outputs.uboot }}
          name: U-Boot ${{ steps.meta.outputs.uboot }} — Orange Pi 5
          make_latest: true
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            Pre-built SPI U-Boot for the Orange Pi 5 / 5B / 5 Plus.

            | Component | Version |
            | --------- | ------- |
            | U-Boot    | ${{ steps.meta.outputs.uboot }} |
            | Arm Trusted Firmware (BL31) | ${{ steps.meta.outputs.atf }} |
            | Rockchip DDR blob (rkbin)   | ${{ steps.meta.outputs.rkbin_ddr }} |
            | rkbin commit | `${{ steps.meta.outputs.rkbin_ref }}` |

            **Verify a binary**

            SLSA build provenance:
            ```bash
            gh attestation verify u-boot-orangepi5-spi.bin --repo ${{ github.repository }}
            ```

            Cosign signature (download the matching `.cosign.bundle`):
            ```bash
            cosign verify-blob \
              --bundle u-boot-orangepi5-spi.bin.cosign.bundle \
              --certificate-identity-regexp '^https://github.com/${{ github.repository }}/' \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              u-boot-orangepi5-spi.bin
            ```
          files: |
            artifacts/*.bin
            artifacts/*.manifest.json
            artifacts/*.cosign.bundle
