name: Reproducibility check

# Proves the "reproducible build" claim: the same inputs must yield a
# byte-identical binary. Runs weekly and on demand (a full no-cache rebuild is
# expensive, so it does not gate every PR).
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

env:
  SOURCE_DATE_EPOCH: "1712055538"

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  verify:
    name: Rebuild and compare
    runs-on:
      - ubicloud-standard-16-arm
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build twice (no cache) and compare hashes
        run: |
          for i in 1 2; do
            rm -rf "out${i}"
            docker buildx build --platform=linux/arm64 --no-cache \
              --build-arg SOURCE_DATE_EPOCH="${SOURCE_DATE_EPOCH}" \
              --build-arg BOARD=orangepi5 \
              --build-arg DEFCONFIG=orangepi-5-rk3588s \
              --build-arg OPTEE=off \
              --output "type=local,dest=out${i}" .
          done
          a=$(sha256sum out1/u-boot-orangepi5-spi.bin | cut -d' ' -f1)
          b=$(sha256sum out2/u-boot-orangepi5-spi.bin | cut -d' ' -f1)
          echo "build 1: $a"
          echo "build 2: $b"
          if [ "$a" != "$b" ]; then
            echo "::error::Build is not reproducible — identical inputs produced different binaries"
            exit 1
          fi
          echo "✓ reproducible: $a"
